<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="light dark" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png" />

    <title>{% block title %}{{ config.title }}{% endblock title %}</title>
    {% block meta %}
    <meta name="description" content="{{ config.description }}" />
    {% endblock meta %}
  </head>
  <body class="wrapper">
    <nav class="nav-header">
      <p class="header-title mono">
        <a href="/"> <span class="accent">Some</span>(Michael Rutter) => </a>
      </p>

      <ul class="nav-links">
        <li>
          <a
            class="{% if current_path and current_path == '/' %}active{% endif %}"
            href="/"
            >blog</a
          >
        </li>
        <li>
          <a
            class="{% if current_path and current_path == '/about/' %}active{% endif %}"
            href="/about/"
            >about</a
          >
        </li>
        <li>
          <a
            class="{% if current_path and current_path == '/tags/' %}active{% endif %}"
            href="/tags/"
            >tags</a
          >
        </li>
      </ul>
    </nav>

    <main class="main">{% block content %}{% endblock content %}</main>

    <footer class="footer">
      <ul class="contacts">
        <li>
          <a
            target="_blank"
            rel="noopener noreferrer"
            href="https://bsky.app/profile/m-rutter.com"
            aria-label="Bluesky"
          >
            <img
              src="/icons/bluesky.svg"
              alt=""
              aria-hidden="true"
              class="icon"
            />
            @m-rutter.com
          </a>
        </li>
        <li>
          <a
            target="_blank"
            rel="noopener noreferrer"
            href="https://github.com/m-rutter"
            aria-label="GitHub"
          >
            <img
              src="/icons/github.svg"
              alt=""
              aria-hidden="true"
              class="icon"
            />
            /m-rutter
          </a>
        </li>
        <li>
          <img src="/icons/globe.svg" alt="" aria-hidden="true" class="icon" />
          London-ish, UK
        </li>
      </ul>
    </footer>
  </body>
</html>
