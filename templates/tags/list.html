{% extends "base.html" %} {% block title %} {{ config.title }} => categories {%
endblock title %} {% block content %}
<article>
  <header>
    <h2>tags</h2>
  </header>
  <section>
    {% if terms %}
    <ul>
      {% for term in terms %}
      <li>
        <a href="{{ term.permalink }}">{{ term.name }}</a> ({{ term.pages |
        length }})
      </li>
      {% endfor %}
    </ul>
    {% endif %}
  </section>
</article>
{% endblock content %}
